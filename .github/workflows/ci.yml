name: CI

on:
  # Run on pushes to main (post-merge) and on every PR. Branch pushes are covered
  # by the pull_request trigger, avoiding duplicate runs on PR branches.
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        # libusb (used by the `rusb` crate for USB enumeration) — pkg-config lets
        # rusb link the system library instead of vendoring it.
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings denied)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  check-macos:
    runs-on: macos-14 # Apple Silicon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        # rusb vendors libusb by default, but installing it lets the build link
        # the system library and keeps pkg-config-based detection happy.
        run: brew install libusb pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets --locked

      - name: Clippy (warnings denied)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  audit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      # The dependency tree was clean (0 advisories) when this gate was added,
      # so it blocks on any new RustSec advisory. Relax to continue-on-error
      # only if a future advisory has no available fix.
      - name: Audit dependencies
        run: cargo audit
